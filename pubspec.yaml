name=pubspec.yaml
flutter:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.0
  
  # Video Player
  media_kit: ^0.1.4
  media_kit_video: ^0.1.4
  
  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.1.0
  
  # JSON Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.0
  
  # Routing
  go_router: ^10.0.0
  
  # UI Components
  flutter_spinkit: ^5.2.0
  cached_network_image: ^3.3.0
  smooth_page_indicator: ^1.1.0
  shimmer: ^3.0.0
  
  # GraphQL
  graphql_flutter: ^5.1.0
  
  # Toast Notifications
  fluttertoast: ^8.2.0
  
  # Utils
  intl: ^0.18.0
  connectivity_plus: ^4.0.0
  package_info_plus: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
